<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-Puzzle AI - Visual History & Alignment Fix</title>
    <style>
        :root {
            --bg-color: #0b1120; /* Color de fondo oscuro */
            --panel-bg: #1e293b; /* Color de fondo de los paneles */
            --tile-bg: #3b82f6; /* Color de ficha azul brillante */
            --text-color: #f8fafc; /* Color de texto claro */
            --accent-color: #38bdf8; /* Color de acento azul cielo */
            --tile-hover-bg: #60a5fa; /* Color de ficha al pasar el ratón */
            --border-color: #334155; /* Color de borde de panel */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--accent-color);
            margin: 0 0 5px 0;
            font-size: 2.5rem;
            letter-spacing: 1px;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        .subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .app-container {
            display: flex;
            gap: 40px;
            max-width: 1000px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* --- SECCIÓN DEL JUEGO (PANEL DE JUEGO) --- */
        .game-section {
            background-color: var(--panel-bg);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
            padding: 10px;
            background-color: #0f172a; /* Fondo del tablero más oscuro para contraste */
            border-radius: 12px;
            margin-bottom: 25px;
            justify-content: center; /* Centrar el tablero */
            position: relative;
        }

        .tile {
            background-color: var(--tile-bg);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .tile:hover {
            background-color: var(--tile-hover-bg);
            transform: scale(1.02);
        }

        .empty-tile {
            background-color: transparent;
            cursor: default;
            box-shadow: none;
        }

        .tile:hover.empty-tile {
             background-color: transparent;
             transform: none;
        }

        .game-controls {
            display: flex;
            gap: 15px;
            align-items: center;
            width: 100%;
            justify-content: space-between;
        }

        .moves-counter {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-color);
            background: rgba(15, 23, 42, 0.6);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .btn-reset {
            background-color: #ef4444;
            color: white;
        }

        .btn-reset:hover {
            background-color: #f87171;
            transform: translateY(-2px);
        }

        /* --- SECCIÓN DEL HISTORIAL VISUAL --- */
        .history-section {
            width: 350px;
            height: 520px; /* Misma altura aprox que el juego */
            background-color: var(--panel-bg);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .history-header {
            padding: 20px;
            background-color: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid var(--border-color);
            font-weight: bold;
            text-align: center;
            color: var(--accent-color);
            font-size: 1.1rem;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Scrollbar styling */
        .history-list::-webkit-scrollbar { width: 8px; }
        .history-list::-webkit-scrollbar-track { background: transparent; }
        .history-list::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        .history-list::-webkit-scrollbar-thumb:hover { background: #64748b; }

        .history-card {
            background-color: #0f172a; /* Fondo de tarjeta de historial más oscuro */
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .history-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .step-num {
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: bold;
        }

        .step-desc {
            font-size: 0.95rem;
            color: white;
        }

        .step-desc span {
            color: var(--accent-color);
            font-weight: bold;
        }

        /* --- MINI TABLERO PARA EL HISTORIAL (MINIATURA) --- */
        .mini-board {
            display: grid;
            grid-template-columns: repeat(3, 20px);
            grid-template-rows: repeat(3, 20px);
            gap: 2px;
            padding: 2px;
            background-color: #334155;
            border-radius: 6px;
        }

        .mini-tile {
            background-color: var(--tile-bg);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
            border-radius: 3px;
        }

        .mini-tile.empty-tile {
            background-color: transparent;
        }

        .empty-history-msg {
            text-align: center;
            color: #64748b;
            margin-top: 50px;
            font-style: italic;
        }

    </style>
</head>
<body>

    <div class="header">
        <h1>8-Puzzle AI</h1>
        <p class="subtitle">STATE SPACE SEARCH ENGINE</p>
    </div>
    
    <div class="app-container">
        
        <section class="game-section">
            <div id="board" class="board">
                </div>
            <div class="game-controls">
                <span id="moves-counter" class="moves-counter">Movimientos: 0</span>
                <button id="reset-btn" class="btn btn-reset" onclick="initGame()">Reiniciar Estado</button>
            </div>
        </section>

        <section class="history-section">
            <div class="history-header">
                Historial de Estados
            </div>
            <div id="history-list" class="history-list">
                <div class="empty-history-msg">Realiza un movimiento para comenzar a registrar la ruta.</div>
            </div>
        </section>

    </div>

    <script>
        // Estados correctos basados en image_1.png
        // 0 representa el espacio vacío
        const initialState = [5, 4, 0, 6, 1, 8, 7, 3, 2];
        const goalState = [1, 2, 3, 8, 0, 4, 7, 6, 5];
        let currentState = [];
        let moves = 0;
        let history = []; // Guardará objetos: { step, movedTileNum, stateBefore, stateAfter }

        // Inicializar el juego
        function initGame() {
            currentState = [...initialState];
            moves = 0;
            history = [];
            document.getElementById('moves-counter').innerText = `Movimientos: ${moves}`;
            document.getElementById('history-list').innerHTML = '<div class="empty-history-msg">Realiza un movimiento para comenzar a registrar la ruta.</div>';
            renderBoard();
        }

        // Renderizar el tablero principal perfectamente alineado
        function renderBoard() {
            const board = document.getElementById('board');
            board.innerHTML = ''; // Limpiar tablero
            
            currentState.forEach((tile, index) => {
                const tileDiv = document.createElement('div');
                tileDiv.className = `tile ${tile === 0 ? 'empty-tile' : ''}`;
                tileDiv.innerText = tile === 0 ? '' : tile;
                if (tile !== 0) {
                    tileDiv.addEventListener('click', () => moveTile(index));
                }
                board.appendChild(tileDiv);
            });
            checkWin();
        }

        // Lógica de movimiento
        function moveTile(tileIndex) {
            const emptyIndex = currentState.indexOf(0);
            const validMoves = getValidMoves(emptyIndex);
            
            if (validMoves.includes(tileIndex)) {
                const movedTileNum = currentState[tileIndex];
                const stateBefore = [...currentState];
                
                // Intercambiar fichas
                [currentState[tileIndex], currentState[emptyIndex]] = [currentState[emptyIndex], currentState[tileIndex]];
                
                moves++;
                document.getElementById('moves-counter').innerText = `Movimientos: ${moves}`;
                
                // Actualizar historial visual
                updateHistory(movedTileNum, stateBefore, currentState);
                renderBoard();
            }
        }

        // Devolver índices de fichas adyacentes al vacío
        function getValidMoves(emptyIndex) {
            const moves = [];
            const row = Math.floor(emptyIndex / 3);
            const col = emptyIndex % 3;
            
            if (row > 0) moves.push(emptyIndex - 3); // Arriba
            if (row < 2) moves.push(emptyIndex + 3); // Abajo
            if (col > 0) moves.push(emptyIndex - 1); // Izquierda
            if (col < 2) moves.push(emptyIndex + 1); // Derecha
            
            return moves;
        }

        // Actualizar el panel de historial visual con miniaturas perfectas
        function updateHistory(movedNum, stateBefore, stateAfter) {
            const historyList = document.getElementById('history-list');
            
            // Eliminar mensaje de historial vacío en el primer movimiento
            if (moves === 1) {
                historyList.innerHTML = '';
            }

            const card = document.createElement('div');
            card.className = 'history-card';
            
            // Información de texto
            const infoDiv = document.createElement('div');
            infoDiv.className = 'history-info';
            infoDiv.innerHTML = `
                <div class="step-num">Paso ${moves}</div>
                <div class="step-desc">Movió ficha <span>${movedNum}</span></div>
            `;
            card.appendChild(infoDiv);

            // Mini tablero gráfico perfectly aligned
            const miniBoardDiv = renderMiniBoard(stateAfter);
            card.appendChild(miniBoardDiv);

            // Añadir tarjeta al historial
            historyList.appendChild(card);
            
            // Auto-scroll hasta el final del historial
            historyList.scrollTop = historyList.scrollHeight;
        }

        // Renderizar una miniatura de tablero para el historial perfectamente alineada
        function renderMiniBoard(state) {
            const miniBoard = document.createElement('div');
            miniBoard.className = 'mini-board';
            
            state.forEach(val => {
                const miniTile = document.createElement('div');
                if(val === 0) {
                    miniTile.className = 'mini-tile empty-tile';
                } else {
                    miniTile.className = 'mini-tile';
                    miniTile.innerText = val;
                }
                miniBoard.appendChild(miniTile);
            });
            return miniBoard;
        }

        // Comprobar si se ha alcanzado el estado objetivo
        function checkWin() {
            const isWin = currentState.every((val, index) => val === goalState[index]);
            if (isWin) {
                setTimeout(() => {
                    alert(`¡Excelente! Has resuelto el puzzle de 8 piezas en ${moves} movimientos.`);
                }, 100);
            }
        }

        // Arrancar juego al cargar la página
        initGame();
    </script>
</body>
</html>
