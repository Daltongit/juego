<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-Puzzle IA - Visual History</title>
    <style>
        :root {
            --bg-color: #0b1120;
            --panel-bg: #1e293b;
            --tile-bg: #3b82f6;
            --tile-hover: #60a5fa;
            --accent: #38bdf8;
            --text-color: #f8fafc;
            --border-color: #334155;
            
            /* Medidas del tablero principal */
            --tile-size: 100px;
            --gap: 10px;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--accent);
            margin: 0 0 5px 0;
            font-size: 2.5rem;
            letter-spacing: 1px;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        .subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Contenedor principal dividido en 2 columnas */
        .app-container {
            display: flex;
            gap: 40px;
            max-width: 1000px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* --- SECCIÓN DEL JUEGO --- */
        .game-section {
            background-color: var(--panel-bg);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .board {
            position: relative;
            width: calc((var(--tile-size) * 3) + (var(--gap) * 2));
            height: calc((var(--tile-size) * 3) + (var(--gap) * 2));
            background-color: #0f172a;
            border-radius: 12px;
            padding: var(--gap);
            box-sizing: content-box;
        }

        .tile {
            position: absolute;
            width: var(--tile-size);
            height: var(--tile-size);
            background: linear-gradient(135deg, var(--tile-bg), #1d4ed8);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); /* Animación con un ligero rebote */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5), inset 0 2px 4px rgba(255,255,255,0.3);
            z-index: 10;
        }

        .tile:hover {
            background: linear-gradient(135deg, var(--tile-hover), #2563eb);
            z-index: 20;
            box-shadow: 0 15px 20px -3px rgba(0, 0, 0, 0.6), inset 0 2px 4px rgba(255,255,255,0.4);
        }

        .controls {
            margin-top: 25px;
            display: flex;
            gap: 15px;
            align-items: center;
            width: 100%;
            justify-content: space-between;
        }

        .moves-counter {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent);
            background: rgba(15, 23, 42, 0.6);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        button.btn-reset {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background-color: #ef4444;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        button.btn-reset:hover {
            background-color: #f87171;
            transform: translateY(-2px);
        }

        /* --- SECCIÓN DEL HISTORIAL VISUAL --- */
        .history-section {
            width: 320px;
            height: 480px; /* Misma altura aprox que el juego */
            background-color: var(--panel-bg);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .history-header {
            padding: 20px;
            background-color: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid var(--border-color);
            font-weight: bold;
            text-align: center;
            color: var(--accent);
            font-size: 1.1rem;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Scrollbar styling */
        .history-list::-webkit-scrollbar { width: 8px; }
        .history-list::-webkit-scrollbar-track { background: transparent; }
        .history-list::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        .history-list::-webkit-scrollbar-thumb:hover { background: #64748b; }

        .history-card {
            background-color: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .history-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .step-num {
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: bold;
        }

        .step-desc {
            font-size: 0.95rem;
            color: white;
        }

        .step-desc span {
            color: var(--accent);
            font-weight: bold;
        }

        /* --- MINI TABLERO PARA EL HISTORIAL --- */
        .mini-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            width: 60px;
            height: 60px;
            background-color: #334155;
            padding: 2px;
            border-radius: 6px;
        }

        .mini-tile {
            background-color: var(--tile-bg);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
            border-radius: 3px;
        }

        .mini-tile.empty {
            background-color: transparent;
        }

        .empty-history-msg {
            text-align: center;
            color: #64748b;
            margin-top: 50px;
            font-style: italic;
        }

    </style>
</head>
<body>

    <div class="header">
        <h1>8-Puzzle AI</h1>
        <div class="subtitle">State Space Search Engine</div>
    </div>
    
    <div class="app-container">
        
        <div class="game-section">
            <div class="board" id="board">
                </div>
            <div class="controls">
                <div class="moves-counter" id="moves-text">Movimientos: 0</div>
                <button class="btn-reset" onclick="resetGame()">Reiniciar Estado</button>
            </div>
        </div>

        <div class="history-section">
            <div class="history-header">
                Historial de Estados
            </div>
            <div class="history-list" id="history-list">
                <div class="empty-history-msg">Realiza un movimiento para comenzar a registrar la ruta.</div>
            </div>
        </div>

    </div>

    <script>
        const boardEl = document.getElementById('board');
        const movesEl = document.getElementById('moves-text');
        const historyListEl = document.getElementById('history-list');
        
        const TILE_SIZE = 100; 
        const GAP = 10;

        // Estado inicial
        const initialState = [5, 4, 0, 6, 1, 8, 7, 3, 2];
        const goalState = [1, 2, 3, 8, 0, 4, 7, 6, 5];
        
        let currentState = [...initialState];
        let moves = 0;
        let moveHistory = []; // Guardará objetos: { step, movedNum, stateArray }

        function initGame() {
            boardEl.innerHTML = ''; 
            moves = 0;
            moveHistory = [];
            currentState = [...initialState];
            updateMovesDisplay();
            renderHistoryLog();

            currentState.forEach((num) => {
                if (num !== 0) {
                    const tile = document.createElement('div');
                    tile.classList.add('tile');
                    tile.id = `tile-${num}`;
                    tile.innerText = num;
                    tile.onclick = () => handleTileClick(num);
                    boardEl.appendChild(tile);
                }
            });

            // Dar un pequeño tiempo para que el DOM se dibuje antes de posicionar (para la animación inicial si se desea)
            setTimeout(renderPositions, 50);
        }

        function getCoordinates(index) {
            const row = Math.floor(index / 3);
            const col = index % 3;
            // Calcular posición absoluta sumando el tamaño de las fichas y los gaps correspondientes
            const x = col * (TILE_SIZE + GAP) + GAP; 
            const y = row * (TILE_SIZE + GAP) + GAP;
            return { x, y };
        }

        function renderPositions() {
            currentState.forEach((num, index) => {
                if (num !== 0) {
                    const tileEl = document.getElementById(`tile-${num}`);
                    const { x, y } = getCoordinates(index);
                    tileEl.style.transform = `translate(${x}px, ${y}px)`;
                }
            });
        }

        function handleTileClick(num) {
            const tileIndex = currentState.indexOf(num);
            const emptyIndex = currentState.indexOf(0);

            if (isAdjacent(tileIndex, emptyIndex)) {
                // Intercambiar en el array
                [currentState[tileIndex], currentState[emptyIndex]] = [currentState[emptyIndex], currentState[tileIndex]];
                
                moves++;
                
                // Guardar la foto del estado ACTUAL en el historial
                moveHistory.push({
                    step: moves,
                    movedNum: num,
                    stateArray: [...currentState]
                });

                updateMovesDisplay();
                renderPositions(); 
                renderHistoryLog(); 

                setTimeout(checkWin, 300);
            }
        }

        function isAdjacent(index1, index2) {
            const row1 = Math.floor(index1 / 3);
            const col1 = index1 % 3;
            const row2 = Math.floor(index2 / 3);
            const col2 = index2 % 3;
            return (Math.abs(row1 - row2) + Math.abs(col1 - col2)) === 1;
        }

        function updateMovesDisplay() {
            movesEl.innerText = `Movimientos: ${moves}`;
        }

        function resetGame() {
            initGame();
        }

        // --- FUNCIONES DEL HISTORIAL VISUAL ---
        function renderHistoryLog() {
            if (moveHistory.length === 0) {
                historyListEl.innerHTML = '<div class="empty-history-msg">Realiza un movimiento para comenzar a registrar la ruta.</div>';
                return;
            }
            
            historyListEl.innerHTML = ''; // Limpiar lista

            moveHistory.forEach(record => {
                const card = document.createElement('div');
                card.className = 'history-card';
                
                // Crear información de texto
                const infoDiv = document.createElement('div');
                infoDiv.className = 'history-info';
                infoDiv.innerHTML = `
                    <div class="step-num">Paso ${record.step}</div>
                    <div class="step-desc">Movió ficha <span>${record.movedNum}</span></div>
                `;

                // Crear mini tablero gráfico
                const miniBoardDiv = document.createElement('div');
                miniBoardDiv.className = 'mini-board';
                
                record.stateArray.forEach(val => {
                    const miniTile = document.createElement('div');
                    if(val === 0) {
                        miniTile.className = 'mini-tile empty';
                    } else {
                        miniTile.className = 'mini-tile';
                        miniTile.innerText = val;
                    }
                    miniBoardDiv.appendChild(miniTile);
                });

                card.appendChild(infoDiv);
                card.appendChild(miniBoardDiv);
                historyListEl.appendChild(card);
            });

            // Auto-scroll al final
            historyListEl.scrollTop = historyListEl.scrollHeight;
        }

        function checkWin() {
            const isWin = currentState.every((val, index) => val === goalState[index]);
            if (isWin) {
                alert(`¡Misión cumplida! Has resuelto el puzzle en ${moves} movimientos.`);
            }
        }

        // Arrancar juego
        initGame();
    </script>
</body>
</html>
