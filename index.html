<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-Puzzle IA - Animaciones e Historial</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --board-bg: #1e293b;
            --tile-bg: #3b82f6;
            --tile-hover: #2563eb;
            --text-color: #f8fafc;
            --tile-size: 100px;
            --gap: 12px;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            color: #38bdf8;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 25px;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .game-wrapper {
            background-color: var(--board-bg);
            padding: var(--gap);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 
                        inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .board {
            position: relative;
            width: calc((var(--tile-size) * 3) + (var(--gap) * 2));
            height: calc((var(--tile-size) * 3) + (var(--gap) * 2));
        }

        .tile {
            position: absolute;
            width: var(--tile-size);
            height: var(--tile-size);
            background: linear-gradient(145deg, var(--tile-bg), #1d4ed8);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 6px 12px rgba(0,0,0,0.3), 
                        inset 0 2px 0 rgba(255,255,255,0.2);
            z-index: 10;
        }

        .tile:hover {
            background: var(--tile-hover);
            z-index: 20;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4), 
                        inset 0 2px 0 rgba(255,255,255,0.3);
        }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background-color: #38bdf8;
            color: #0f172a;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        button:hover {
            background-color: #7dd3fc;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        /* Botón específico para el historial */
        .btn-history {
            background-color: #475569;
            color: white;
        }

        .btn-history:hover {
            background-color: #64748b;
        }

        .moves-counter {
            font-size: 1.1rem;
            font-weight: 600;
            color: #cbd5e1;
            background: rgba(0,0,0,0.2);
            padding: 10px 15px;
            border-radius: 8px;
        }

        /* Panel de historial */
        .history-panel {
            margin-top: 15px;
            width: 100%;
            max-width: 350px;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 15px;
            box-sizing: border-box;
            max-height: 150px;
            overflow-y: auto;
            display: none; /* Oculto por defecto */
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .history-panel.show {
            display: block;
        }

        .history-item {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 6px;
            padding-bottom: 6px;
            border-bottom: 1px solid #1e293b;
            display: flex;
            justify-content: space-between;
        }
        
        .history-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
            color: #38bdf8; /* Destacar el último movimiento */
            font-weight: bold;
        }

        /* Estilizar el scrollbar del panel */
        .history-panel::-webkit-scrollbar {
            width: 8px;
        }
        .history-panel::-webkit-scrollbar-track {
            background: #0f172a;
        }
        .history-panel::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h1>8-Puzzle</h1>
    <div class="subtitle">STATE SPACE SEARCH</div>
    
    <div class="game-wrapper">
        <div class="board" id="board">
            </div>
    </div>

    <div class="controls">
        <div class="moves-counter" id="moves-text">Movimientos: 0</div>
        <button class="btn-history" onclick="toggleHistory()">Historial de Movimientos</button>
        <button onclick="resetGame()">Reiniciar Estado</button>
    </div>

    <div id="history-panel" class="history-panel"></div>

    <script>
        const boardEl = document.getElementById('board');
        const movesEl = document.getElementById('moves-text');
        const historyPanel = document.getElementById('history-panel');
        
        const TILE_SIZE = 100; 
        const GAP = 12;

        const initialState = [5, 4, 0, 6, 1, 8, 7, 3, 2];
        const goalState = [1, 2, 3, 8, 0, 4, 7, 6, 5];
        
        let currentState = [...initialState];
        let moves = 0;
        let moveHistory = []; // Aquí guardaremos el registro

        function initGame() {
            boardEl.innerHTML = ''; 
            moves = 0;
            moveHistory = [];
            currentState = [...initialState];
            updateMovesDisplay();
            renderHistoryLog();

            currentState.forEach((num) => {
                if (num !== 0) {
                    const tile = document.createElement('div');
                    tile.classList.add('tile');
                    tile.id = `tile-${num}`;
                    tile.innerText = num;
                    tile.onclick = () => handleTileClick(num);
                    boardEl.appendChild(tile);
                }
            });

            renderPositions();
        }

        function getCoordinates(index) {
            const row = Math.floor(index / 3);
            const col = index % 3;
            const x = col * (TILE_SIZE + GAP);
            const y = row * (TILE_SIZE + GAP);
            return { x, y };
        }

        function renderPositions() {
            currentState.forEach((num, index) => {
                if (num !== 0) {
                    const tileEl = document.getElementById(`tile-${num}`);
                    const { x, y } = getCoordinates(index);
                    tileEl.style.transform = `translate(${x}px, ${y}px)`;
                }
            });
        }

        function handleTileClick(num) {
            const tileIndex = currentState.indexOf(num);
            const emptyIndex = currentState.indexOf(0);

            if (isAdjacent(tileIndex, emptyIndex)) {
                // Registrar el movimiento antes de hacerlo
                moves++;
                moveHistory.push(`Paso ${moves}: Ficha [ ${num} ] movida`);

                [currentState[tileIndex], currentState[emptyIndex]] = [currentState[emptyIndex], currentState[tileIndex]];
                
                updateMovesDisplay();
                renderPositions(); 
                renderHistoryLog(); // Actualizar la vista del panel

                setTimeout(checkWin, 300);
            }
        }

        function isAdjacent(index1, index2) {
            const row1 = Math.floor(index1 / 3);
            const col1 = index1 % 3;
            const row2 = Math.floor(index2 / 3);
            const col2 = index2 % 3;
            return (Math.abs(row1 - row2) + Math.abs(col1 - col2)) === 1;
        }

        function updateMovesDisplay() {
            movesEl.innerText = `Movimientos: ${moves}`;
        }

        function resetGame() {
            initGame();
        }

        // Funciones del Historial
        function toggleHistory() {
            historyPanel.classList.toggle('show');
            renderHistoryLog();
        }

        function renderHistoryLog() {
            if (moveHistory.length === 0) {
                historyPanel.innerHTML = '<div class="history-item">Aún no hay movimientos registrados.</div>';
                return;
            }
            
            // Llenar el panel con el array de movimientos
            historyPanel.innerHTML = moveHistory.map(mov => `<div class="history-item"><span>${mov}</span></div>`).join('');
            
            // Hacer scroll automático hacia abajo para ver el último movimiento
            historyPanel.scrollTop = historyPanel.scrollHeight;
        }

        function checkWin() {
            const isWin = currentState.every((val, index) => val === goalState[index]);
            if (isWin) {
                alert(`¡Excelente! Llegaste al nodo objetivo en ${moves} movimientos.`);
            }
        }

        // Arrancar juego
        initGame();
    </script>
</body>
</html>
