<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-Puzzle IA - Animaciones Fluidas</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --board-bg: #1e293b;
            --tile-bg: #3b82f6; /* Azul más vibrante */
            --tile-hover: #2563eb;
            --text-color: #f8fafc;
            --tile-size: 100px;
            --gap: 12px;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            color: #38bdf8;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 25px;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .game-wrapper {
            background-color: var(--board-bg);
            padding: var(--gap);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 
                        inset 0 1px 0 rgba(255,255,255,0.1);
        }

        /* El contenedor principal debe tener tamaño fijo para el posicionamiento absoluto */
        .board {
            position: relative;
            /* 3 fichas + 2 espacios entre ellas */
            width: calc((var(--tile-size) * 3) + (var(--gap) * 2));
            height: calc((var(--tile-size) * 3) + (var(--gap) * 2));
        }

        .tile {
            position: absolute;
            width: var(--tile-size);
            height: var(--tile-size);
            background: linear-gradient(145deg, var(--tile-bg), #1d4ed8);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            user-select: none;
            /* Aquí está la magia de la fluidez: */
            transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 6px 12px rgba(0,0,0,0.3), 
                        inset 0 2px 0 rgba(255,255,255,0.2);
            z-index: 10;
        }

        .tile:hover {
            background: var(--tile-hover);
            z-index: 20;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4), 
                        inset 0 2px 0 rgba(255,255,255,0.3);
        }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background-color: #38bdf8;
            color: #0f172a;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        button:hover {
            background-color: #7dd3fc;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .moves-counter {
            font-size: 1.2rem;
            font-weight: 600;
            color: #cbd5e1;
            background: rgba(0,0,0,0.2);
            padding: 10px 20px;
            border-radius: 8px;
        }

    </style>
</head>
<body>

    <h1>8-Puzzle</h1>
    <div class="subtitle">STATE SPACE SEARCH</div>
    
    <div class="game-wrapper">
        <div class="board" id="board">
            </div>
    </div>

    <div class="controls">
        <div class="moves-counter" id="moves-text">Movimientos: 0</div>
        <button onclick="resetGame()">Reiniciar Estado</button>
    </div>

    <script>
        const boardEl = document.getElementById('board');
        const movesEl = document.getElementById('moves-text');
        
        // Variables de diseño para calcular las posiciones en JS
        const TILE_SIZE = 100; 
        const GAP = 12;

        // Estado inicial exacto que pediste
        const initialState = [5, 4, 0, 6, 1, 8, 7, 3, 2];
        // El Goal State según la imagen
        const goalState = [1, 2, 3, 8, 0, 4, 7, 6, 5];
        
        let currentState = [...initialState];
        let moves = 0;

        // Inicialización de la UI
        function initGame() {
            boardEl.innerHTML = ''; // Limpiamos si hay algo
            moves = 0;
            currentState = [...initialState];
            updateMovesDisplay();

            // Crear los elementos DOM solo una vez para los números del 1 al 8
            currentState.forEach((num) => {
                if (num !== 0) {
                    const tile = document.createElement('div');
                    tile.classList.add('tile');
                    tile.id = `tile-${num}`;
                    tile.innerText = num;
                    
                    // Evento click
                    tile.onclick = () => handleTileClick(num);
                    
                    boardEl.appendChild(tile);
                }
            });

            // Aplicar posiciones iniciales
            renderPositions();
        }

        // Calcula las coordenadas X e Y basado en el índice del array (0-8)
        function getCoordinates(index) {
            const row = Math.floor(index / 3);
            const col = index % 3;
            const x = col * (TILE_SIZE + GAP);
            const y = row * (TILE_SIZE + GAP);
            return { x, y };
        }

        // Actualiza el CSS transform de cada ficha para animarla a su nueva posición
        function renderPositions() {
            currentState.forEach((num, index) => {
                if (num !== 0) {
                    const tileEl = document.getElementById(`tile-${num}`);
                    const { x, y } = getCoordinates(index);
                    tileEl.style.transform = `translate(${x}px, ${y}px)`;
                }
            });
        }

        // Lógica de movimiento
        function handleTileClick(num) {
            const tileIndex = currentState.indexOf(num);
            const emptyIndex = currentState.indexOf(0);

            if (isAdjacent(tileIndex, emptyIndex)) {
                // Intercambiar en el array lógico
                [currentState[tileIndex], currentState[emptyIndex]] = [currentState[emptyIndex], currentState[tileIndex]];
                
                moves++;
                updateMovesDisplay();
                renderPositions(); // Dispara la animación CSS

                // Pequeño delay para verificar victoria después de que termine la animación
                setTimeout(checkWin, 300);
            }
        }

        // Verifica si dos índices en una cuadrícula 3x3 son adyacentes (arriba, abajo, izq, der)
        function isAdjacent(index1, index2) {
            const row1 = Math.floor(index1 / 3);
            const col1 = index1 % 3;
            const row2 = Math.floor(index2 / 3);
            const col2 = index2 % 3;

            // Son adyacentes si la diferencia absoluta en filas + columnas es exactamente 1
            return (Math.abs(row1 - row2) + Math.abs(col1 - col2)) === 1;
        }

        function updateMovesDisplay() {
            movesEl.innerText = `Movimientos: ${moves}`;
        }

        function resetGame() {
            initGame();
        }

        function checkWin() {
            const isWin = currentState.every((val, index) => val === goalState[index]);
            if (isWin) {
                alert(`¡Excelente! Llegaste al nodo objetivo en ${moves} movimientos.`);
            }
        }

        // Arrancar
        initGame();
    </script>
</body>
</html>
