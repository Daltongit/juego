<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-Puzzle IA - Game</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-color: #1e293b;
            --tile-color: #334155;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h1 {
            margin-bottom: 10px;
            color: var(--accent-color);
        }

        .game-container {
            background-color: var(--card-color);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        /* El tablero */
        .puzzle-board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
            position: relative;
        }

        /* Cada ficha */
        .tile {
            width: 100px;
            height: 100px;
            background-color: var(--tile-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s ease, background-color 0.2s;
            box-shadow: inset 0 -4px 0 rgba(0, 0, 0, 0.2);
        }

        .tile:hover {
            background-color: #475569;
            transform: scale(1.02);
        }

        /* Espacio vacío */
        .tile.empty {
            background-color: transparent;
            box-shadow: none;
            cursor: default;
        }

        .tile.empty:hover {
            transform: none;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            background-color: var(--accent-color);
            color: var(--bg-color);
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .status {
            margin-top: 15px;
            font-size: 1.1rem;
        }
    </style>
</head>

<body>

    <h1>8-Puzzle Game</h1>

    <div class="game-container">
        <div class="puzzle-board" id="board">
        </div>
    </div>

    <div class="status" id="status">Movimientos: 0</div>

    <div class="controls">
        <button onclick="shuffleGame()">Mezclar</button>
        <button onclick="resetGame()">Reiniciar</button>
    </div>

    <script>
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');

        // Estado inicial del tablero (basado en tu imagen "Start State")
        // El 0 representa el espacio vacío
        let tiles = [5, 4, 0, 6, 1, 8, 7, 3, 2];
        let moves = 0;

        function renderBoard() {
            boardElement.innerHTML = '';
            tiles.forEach((tile, index) => {
                const tileDiv = document.createElement('div');
                tileDiv.classList.add('tile');
                if (tile === 0) {
                    tileDiv.classList.add('empty');
                    tileDiv.innerText = '';
                } else {
                    tileDiv.innerText = tile;
                    tileDiv.onclick = () => moveTile(index);
                }
                boardElement.appendChild(tileDiv);
            });
            statusElement.innerText = `Movimientos: ${moves}`;
            checkWin();
        }

        function moveTile(index) {
            const emptyIndex = tiles.indexOf(0);
            const validMoves = getValidMoves(emptyIndex);

            if (validMoves.includes(index)) {
                // Intercambiar posiciones
                [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
                moves++;
                renderBoard();
            }
        }

        function getValidMoves(emptyIndex) {
            const row = Math.floor(emptyIndex / 3);
            const col = emptyIndex % 3;
            const valid = [];

            if (row > 0) valid.push(emptyIndex - 3); // Arriba
            if (row < 2) valid.push(emptyIndex + 3); // Abajo
            if (col > 0) valid.push(emptyIndex - 1); // Izquierda
            if (col < 2) valid.push(emptyIndex + 1); // Derecha

            return valid;
        }

        function shuffleGame() {
            // Mezclado simple realizando movimientos aleatorios válidos
            for (let i = 0; i < 100; i++) {
                const emptyIndex = tiles.indexOf(0);
                const moves = getValidMoves(emptyIndex);
                const randomMove = moves[Math.floor(Math.random() * moves.length)];
                [tiles[randomMove], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[randomMove]];
            }
            moves = 0;
            renderBoard();
        }

        function resetGame() {
            tiles = [5, 4, 0, 6, 1, 8, 7, 3, 2];
            moves = 0;
            renderBoard();
        }

        function checkWin() {
            // El Goal State de tu imagen: 1, 2, 3, 8, vacío, 4, 7, 6, 5
            const goal = [1, 2, 3, 8, 0, 4, 7, 6, 5];
            const isWin = tiles.every((val, index) => val === goal[index]);
            if (isWin && moves > 0) {
                setTimeout(() => alert("¡Felicidades! Lograste el Goal State."), 200);
            }
        }

        // Iniciar juego
        renderBoard();
    </script>
</body>

</html>
